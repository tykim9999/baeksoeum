name: BaekSoeum
options:
  bundleIdPrefix: com.tykim.baeksoeum
  deploymentTarget:
    iOS: "18.0"
    tvOS: "18.0"
  developmentLanguage: ko

packages:
  NoiseEngine:
    path: Packages/NoiseEngine
  LullabyEngine:
    path: Packages/LullabyEngine

targets:
  BaekSoeum:
    type: application
    supportedDestinations: [iOS, tvOS]
    sources:
      - path: App/Sources
      - path: App/Resources/Sounds
        type: folder
        buildPhase: resources
        excludes:
          - "README.md"
      - path: App/Resources/Assets.xcassets
    dependencies:
      - package: NoiseEngine
      - package: LullabyEngine
    settings:
      base:
        TARGETED_DEVICE_FAMILY: "1,2,3"
        SWIFT_VERSION: "6.0"
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: L324XMPY22
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: "6"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        INFOPLIST_FILE: App/Info.plist

  BaekSoeumUITests:
    type: bundle.ui-testing
    supportedDestinations: [iOS, tvOS]
    sources:
      - path: App/UITests
    dependencies:
      - target: BaekSoeum
    settings:
      base:
        SWIFT_VERSION: "6.0"
        TEST_TARGET_NAME: BaekSoeum
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: L324XMPY22
        GENERATE_INFOPLIST_FILE: YES
